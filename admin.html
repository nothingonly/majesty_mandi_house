<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Majesty Mandi House - Admin Dashboard</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --primary-color: #8a0b16;
            --secondary-color: #d4af37;
            --dark-bg: #211512;
            --light-bg: #f4f4f4;
            --white: #fff;
        }
        body {
            font-family: 'Outfit', sans-serif;
            background-color: var(--light-bg);
            margin: 0;
            padding: 0;
            color: #333;
        }
        .admin-header {
            background-color: var(--dark-bg);
            color: var(--secondary-color);
            padding: 20px;
            text-align: center;
        }
        .container {
            max-width: 1000px;
            margin: 30px auto;
            padding: 0 20px;
            display: grid;
            grid-template-columns: 1fr;
            gap: 30px;
        }
        .card {
            background: var(--white);
            padding: 25px;
            border-radius: 12px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.05);
        }
        .card h2 {
            margin-top: 0;
            color: var(--primary-color);
            border-bottom: 2px solid var(--secondary-color);
            padding-bottom: 10px;
            margin-bottom: 20px;
        }
        input, textarea, select {
            width: 100%;
            padding: 12px;
            margin-bottom: 15px;
            border: 1px solid #ccc;
            border-radius: 6px;
            font-family: inherit;
            box-sizing: border-box;
        }
        button {
            background: var(--primary-color);
            color: var(--white);
            border: none;
            padding: 12px 20px;
            border-radius: 6px;
            cursor: pointer;
            font-weight: bold;
            font-size: 1rem;
            transition: 0.3s;
            width: 100%;
        }
        button:hover {
            background: var(--dark-bg);
        }
        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 15px;
        }
        th, td {
            padding: 12px;
            text-align: left;
            border-bottom: 1px solid #ddd;
        }
        th {
            background-color: #f9f9f9;
            color: var(--primary-color);
        }
        .wa-btn {
            background: #25d366;
            color: white;
            padding: 6px 12px;
            border-radius: 4px;
            text-decoration: none;
            font-size: 0.8rem;
            display: inline-flex;
            align-items: center;
            gap: 5px;
        }
        .wa-btn:hover {
            background: #128c7e;
        }
        .back-link {
            display: inline-block;
            margin-top: 20px;
            color: var(--primary-color);
            text-decoration: none;
            font-weight: bold;
        }
    </style>
</head>
<body>

    <div class="admin-header">
        <h1><i class="fas fa-crown"></i> Majesty Admin Dashboard</h1>
    </div>

    <div class="container">
        
        <!-- Today's Special Manager -->
        <div class="card">
            <h2>Update "Today's Special"</h2>
            <form id="special-form">
                <input type="text" id="sp-name" placeholder="Dish Name (e.g. Special Family Mandi Platter)" required>
                <textarea id="sp-desc" placeholder="Description" rows="3" required></textarea>
                <input type="number" id="sp-price" placeholder="Price (₹)" required>
                <input type="text" id="sp-offer" placeholder="Special Offer (e.g. Includes 2 Free Starters)" required>
                <button type="submit">Update Special Menu</button>
            </form>
            <p id="sp-msg" style="color: green; display: none; margin-top: 10px;">Successfully updated!</p>
        </div>

        <!-- Festival Greetings Generator -->
        <div class="card">
            <h2>Festival WhatsApp Greetings</h2>
            <p>Select a festival and generate a greeting for your collected leads.</p>
            <select id="festival-select">
                <option value="ramadan">Ramadan Mubarak</option>
                <option value="eid">Eid Wishes</option>
                <option value="sankranti">Sankranti Wishes</option>
                <option value="diwali">Diwali Wishes</option>
                <option value="custom">Custom Offer</option>
            </select>
            <textarea id="greeting-msg" rows="4">Ramadan Mubarak! 🌙 Visit Majesty Mandi House this holy month and enjoy our special Iftar combos. May your days be filled with peace and blessings.</textarea>
        </div>

        <!-- Leads Database -->
        <div class="card">
            <h2>Collected Leads</h2>
            <div style="overflow-x: auto;">
                <table>
                    <thead>
                        <tr>
                            <th>Date</th>
                            <th>Name</th>
                            <th>Mobile Number</th>
                            <th>Action</th>
                        </tr>
                    </thead>
                    <tbody id="leads-table-body">
                        <!-- Loaded via JS -->
                    </tbody>
                </table>
            </div>
            <p id="no-leads" style="display:none; color: #888;">No leads collected yet.</p>
        </div>

        <div style="text-align: center;">
            <a href="index.html" class="back-link"><i class="fas fa-arrow-left"></i> Back to Main Website</a>
        </div>
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            // 1. Handle Today's Special
            const specialForm = document.getElementById('special-form');
            
            // Pre-fill if exists
            const existingSpecial = JSON.parse(localStorage.getItem('majestySpecial'));
            if(existingSpecial) {
                document.getElementById('sp-name').value = existingSpecial.name;
                document.getElementById('sp-desc').value = existingSpecial.desc;
                document.getElementById('sp-price').value = existingSpecial.price;
                document.getElementById('sp-offer').value = existingSpecial.offer;
            }

            specialForm.addEventListener('submit', (e) => {
                e.preventDefault();
                const specialData = {
                    name: document.getElementById('sp-name').value,
                    desc: document.getElementById('sp-desc').value,
                    price: document.getElementById('sp-price').value,
                    offer: document.getElementById('sp-offer').value
                };
                localStorage.setItem('majestySpecial', JSON.stringify(specialData));
                const msg = document.getElementById('sp-msg');
                msg.style.display = 'block';
                setTimeout(() => msg.style.display = 'none', 3000);
            });

            // 2. Festival Greetings Templates
            const templates = {
                ramadan: "Ramadan Mubarak! 🌙 Visit Majesty Mandi House this holy month and enjoy our special Iftar combos. May your days be filled with peace and blessings.",
                eid: "Eid Mubarak! ✨ Celebrate this joyous occasion with your family at Majesty Mandi House. Enjoy our authentic Mandi platters!",
                sankranti: "Happy Makar Sankranti! 🪁 Wishing you joy and prosperity. Celebrate the festival with our delicious family combos.",
                diwali: "Happy Diwali! 🪔 May the festival of lights bring you joy. Enjoy a special festive discount at Majesty Mandi House this weekend!",
                custom: "Hello from Majesty Mandi House! We have an exclusive weekend offer just for you. Visit us to claim your discount."
            };

            const festivalSelect = document.getElementById('festival-select');
            const greetingMsg = document.getElementById('greeting-msg');

            festivalSelect.addEventListener('change', (e) => {
                greetingMsg.value = templates[e.target.value];
                renderLeads(); // Re-render to update the WhatsApp links with new message
            });
            
            greetingMsg.addEventListener('input', () => {
                renderLeads(); // Update links if manual edit
            });

            // 3. Render Leads
            function renderLeads() {
                const tbody = document.getElementById('leads-table-body');
                const noLeads = document.getElementById('no-leads');
                const leads = JSON.parse(localStorage.getItem('majestyLeads')) || [];
                
                tbody.innerHTML = '';
                
                if(leads.length === 0) {
                    noLeads.style.display = 'block';
                    return;
                }
                
                noLeads.style.display = 'none';
                const message = encodeURIComponent(greetingMsg.value);
                
                leads.forEach(lead => {
                    const tr = document.createElement('tr');
                    
                    // Format phone number (remove spaces, ensure country code)
                    let phoneStr = lead.phone.replace(/\D/g,'');
                    if(phoneStr.length === 10) phoneStr = '91' + phoneStr;

                    tr.innerHTML = `
                        <td>${lead.date}</td>
                        <td>${lead.name}</td>
                        <td>${lead.phone}</td>
                        <td>
                            <a href="https://wa.me/${phoneStr}?text=${message}" target="_blank" class="wa-btn">
                                <i class="fab fa-whatsapp"></i> Send Greeting
                            </a>
                        </td>
                    `;
                    tbody.appendChild(tr);
                });
            }

            renderLeads();
        });
    </script>
</body>
</html>
